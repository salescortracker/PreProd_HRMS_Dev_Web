<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>Companies</h3>

        <button class="btn btn-primary" routerLink="/companies">

            <i class="fa fa-plus me-1"></i>
            Create Company

        </button>

    </div>


    <!-- Search -->
    <div class="card mb-3 shadow-sm">

        <div class="card-body">

            <input type="text" class="form-control" placeholder="Search company..." [(ngModel)]="searchText"
                (keyup)="searchCompany()">

        </div>

    </div>


    <!-- Table -->
    <div class="card shadow-sm">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">

                    <tr>
                        <th>Company</th>
                        <th>Email</th>
                        <th>Plan</th>
                        <th>Expiry Date</th>
                        <th>Status</th>
                        <th class="text-center">Action</th>
                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let c of filteredCompanies">

                        <td>
                            <i class="fa fa-building me-2 text-primary"></i>
                            {{c.companyName}}
                        </td>

                        <td>{{c.companyEmail}}</td>

                        <td>
                            <span class="badge bg-info">
                                {{c.plan?.planName}}
                            </span>
                        </td>

                        <td>
                            {{c.expiryDate | date:'dd MMM yyyy'}}
                        </td>

                        <td>

                            <span class="badge" [ngClass]="c.isActive ? 'bg-success' : 'bg-danger'">

                                {{c.isActive ? 'Active' : 'Inactive'}}

                            </span>

                        </td>

                        <td class="text-center">

                            <button class="btn btn-sm" [ngClass]="c.isActive ? 'btn-warning' : 'btn-success'"
                                (click)="toggleStatus(c)">

                                {{c.isActive ? 'Disable' : 'Enable'}}

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
