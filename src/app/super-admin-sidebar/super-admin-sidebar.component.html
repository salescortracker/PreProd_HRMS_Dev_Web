<div class="sidebar" [class.collapsed]="collapsed">

  <div
    class="menu-item"
    routerLink="/superadmin/dashboard"
    [class.active]="activeMenu === 'Dashboard'"
    (click)="selectMenu('Dashboard')">
    <i class="fas fa-home menu-icon"></i>
    <span *ngIf="!collapsed">Dashboard</span>
  </div>

  <div
    class="menu-item"
    [class.active]="activeMenu === 'Control Panel'"
    (click)="selectMenu('Control Panel')">
    <i class="fas fa-sliders-h menu-icon"></i>
    <span *ngIf="!collapsed">Control Panel</span>
  </div>

  <div
    class="menu-item"
    [class.active]="activeMenu === 'System & Security'"
    (click)="selectMenu('System & Security')">
    <i class="fas fa-shield-alt menu-icon"></i>
    <span *ngIf="!collapsed">System & Security</span>
  </div>

</div>
