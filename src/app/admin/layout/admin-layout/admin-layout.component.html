<div class="sidebar">

  <div *ngFor="let menu of parentMenus" class="menu-section">

    <div class="menu-title">
      <i class="fa" [ngClass]="menu.icon"></i>
      {{menu.menuName}}
    </div>

    <div class="submenu">

      <div *ngFor="let sub of getChildMenus(menu.menuId)" class="submenu-item" (click)="navigate(sub.url)">

        {{sub.menuName}}

      </div>

    </div>

  </div>

</div>
