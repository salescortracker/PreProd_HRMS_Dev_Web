<app-header></app-header>
<app-sidebar></app-sidebar>

<div class="dashboard-header">
  <h2 class="dashboard-title">Employee Finance</h2>
  <nav class="breadcrumb">
    <a href="#">Home</a> &gt;
    <a href="#">Employee Profile</a> &gt;
    <span>Employee Finance</span>
  </nav>
</div>

<div class="tab-container">

  <!-- Radios -->
  <input  type="radio" id="tab1" name="tab" checked>
  <input  type="radio" id="tab2" name="tab">
  <input  type="radio" id="tab3" name="tab">

  <!-- Tab Header -->
  <div class="tab-header">
    <label class="tab-label" *ngIf="canViewBank" for="tab1">Bank Details</label>
    <label class="tab-label" *ngIf="canViewDD" for="tab2">DD</label>
    <label class="tab-label" *ngIf="canViewW4" for="tab3">W4(USA)</label>
  </div>

  <!-- TAB 1 -->
  <div  id="content1" class="tab-content">
    <app-employee-bank-details></app-employee-bank-details>
  </div>

  <!-- TAB 2 -->
  <div  id="content2" class="tab-content">
    <app-employee-dd-details></app-employee-dd-details>
  </div>

  <!-- TAB 3 -->
  <div  id="content3" class="tab-content">
    <app-employee-w4-details></app-employee-w4-details>
  </div>

</div>
