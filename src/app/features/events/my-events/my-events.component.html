<app-header></app-header>
<app-sidebar></app-sidebar>

<div class="dashboard-header">
  <h2 class="dashboard-title">
    <i class="fa-solid fa-calendar-days me-2 text-danger"></i>
    My Events Calendar
  </h2>
</div>

<div class="container-fluid mt-3">

  <div class="card shadow-sm">
    <div class="card-body">

      <!-- Calendar -->
      <full-calendar [options]="calendarOptions"></full-calendar>

    </div>
  </div>

</div>


<!-- Event Details Modal -->
<div class="modal fade" id="eventDetailsModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content shadow-lg border-0">

      <!-- Modal Header -->
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">
          <i class="fa-solid fa-calendar-check me-2"></i>
          Event Details
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body p-4">

        <div class="row mb-3">
          <div class="col-md-4 fw-bold text-muted">Event Title</div>
          <div class="col-md-8">{{selectedEvent?.title}}</div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4 fw-bold text-muted">Date</div>
          <div class="col-md-8">{{selectedEvent?.date}}</div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4 fw-bold text-muted">Time</div>
          <div class="col-md-8">{{selectedEvent?.time}}</div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4 fw-bold text-muted">Location</div>
          <div class="col-md-8">
            <i class="fa-solid fa-location-dot text-danger me-2"></i>
            {{selectedEvent?.location}}
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4 fw-bold text-muted">Meeting Link</div>
          <div class="col-md-8">
            <a [href]="selectedEvent?.meetingLink" target="_blank" class="btn btn-sm btn-success">
              Join Meeting
            </a>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 fw-bold text-muted">Description</div>
          <div class="col-md-8">
            {{selectedEvent?.description}}
          </div>
        </div>

      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Close
        </button>
      </div>

    </div>
  </div>
</div>


<app-footer></app-footer>
